name: Security Scan

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 6 AM UTC
  push:
    branches: [main]

jobs:
  sast:
    name: SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit bandit-sarif-formatter

      - name: Run Bandit (Python SAST)
        run: |
          bandit -r backend/ --format sarif --output bandit-results.sarif || true

      - name: Upload Bandit results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit-results.sarif
          category: bandit

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Run ESLint security scan
        run: npx eslint src/ --config .eslintrc.json --rule '{"security/detect-object-injection": "warn", "security/detect-non-literal-fs-filename": "warn"}' --ext .ts,.tsx --format sarif --output-file eslint-security-results.sarif || true
        working-directory: frontend

      - name: Upload ESLint results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: frontend/eslint-security-results.sarif
          category: eslint-security

  dependency_scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: pip-audit -r backend/requirements.txt --desc on
        continue-on-error: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run npm audit
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  docker_scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -t reminderbot-backend:scan backend/
          docker build -t reminderbot-frontend:scan frontend/

      - name: Run Trivy on backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reminderbot-backend:scan
          format: sarif
          output: trivy-backend-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy backend results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

      - name: Run Trivy on frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: reminderbot-frontend:scan
          format: sarif
          output: trivy-frontend-results.sarif
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy frontend results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-frontend-results.sarif
          category: trivy-frontend

  secrets_detection:
    name: Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run truffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified --results=verified,unknown

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
