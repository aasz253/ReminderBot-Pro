name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements*.txt"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy

      - name: Lint Python with Ruff
        run: ruff check backend/ --output-format=github

      - name: Format check with Black
        run: black --check backend/

      - name: Import sort check with isort
        run: isort --check-only backend/

      - name: Type check with mypy
        run: mypy backend/ --ignore-missing-imports

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Node deps
        run: npm ci
        working-directory: frontend

      - name: Lint TypeScript with ESLint
        run: npm run lint
        working-directory: frontend

      - name: Format check with Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx,json}"
        working-directory: frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reminderbot
          POSTGRES_PASSWORD: reminderbot_test
          POSTGRES_DB: reminderbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements*.txt"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            -v
        env:
          DATABASE_URL: postgresql+asyncpg://reminderbot:reminderbot_test@localhost:5432/reminderbot_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-ci
          ENVIRONMENT: testing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: frontend

      - name: Run frontend tests
        run: npm run test -- --coverage
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: false
          tags: ghcr.io/${{ github.repository }}/backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and cache frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: false
          tags: ghcr.io/${{ github.repository }}/frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
