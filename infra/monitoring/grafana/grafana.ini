[server]
root_url = http://localhost:3001
serve_from_sub_path = true
domain = localhost

[security]
admin_user = admin
admin_password = admin
secret_key = CHANGE_ME_TO_A_RANDOM_SECRET

[database]
type = sqlite3
path = grafana.db

[log]
mode = console
level = info

[users]
allow_sign_up = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[alerting]
enabled = true
execute_alerts = true

[metrics]
enabled = true
interval_seconds = 10

[grafana_net]
url = https://grafana.net

[explore]
enabled = true
